<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>د. أصيل البخاري | أخصائي العلاج الطبيعي وإعادة التأهيل</title>
  <meta name="description" content="الدكتور أصيل البخاري - أخصائي علاج طبيعي وإعادة التأهيل والوخز بالأبر الصينية في مستشفى الحمد إب.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .intro-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg) 50%, var(--accent-light) 100%);
    }
    .intro-page .container {
      max-width: 900px;
      text-align: center;
    }
    .intro-image {
      max-width: 100%;
      max-height: 70vh;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      margin-bottom: 2rem;
      object-fit: contain;
    }
    .intro-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    .intro-title span {
      color: var(--primary);
    }
    .intro-subtitle {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .intro-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .intro-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 2rem;
    }
    .intro-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
      transition: var(--transition);
    }
    .intro-dot.active {
      background: var(--primary);
      width: 30px;
      border-radius: 6px;
    }
    @media (max-width: 768px) {
      .intro-image {
        max-height: 55vh;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="container">
      <a href="intro1.html" class="logo">
        <div class="logo-icon"><i class="fas fa-user-doctor"></i></div>
        <div class="logo-text">
          د. أصيل البخاري
          <small>أخصائي العلاج الطبيعي</small>
        </div>
      </a>
      <nav class="nav">
        <a href="intro1.html" class="active">التعريف</a>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">عن الدكتور</a>
        <a href="services.html">الخدمات</a>
        <a href="contact.html">حجز موعد</a>
      </nav>
      <a href="contact.html" class="btn btn-primary">
        <i class="fas fa-calendar-check"></i> احجز الآن
      </a>
      <button class="mobile-toggle" id="mobileToggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <!-- Mobile Navigation -->
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <nav class="mobile-nav" id="mobileNav">
    <a href="intro1.html" class="active">التعريف</a>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">عن الدكتور</a>
    <a href="services.html">الخدمات</a>
    <a href="contact.html">حجز موعد</a>
  </nav>

  <!-- Intro Page 1 -->
  <section class="intro-page" id="intro1">
    <div class="container">
      <h1 class="intro-title">د. <span>أصيل البخاري</span></h1>
      <p class="intro-subtitle">أخصائي علاج طبيعي وإعادة التأهيل والوخز بالأبر الصينية</p>
      
      <img src="images/intro1.jpg" alt="د. أصيل البخاري - خدمات العلاج الطبيعي" class="intro-image">
      
      <div class="intro-btns">
        <a href="intro2.html" class="btn btn-primary btn-lg">
          <i class="fas fa-arrow-left"></i> التالي
        </a>
        <a href="index.html" class="btn btn-outline btn-lg">
          <i class="fas fa-home"></i> الرئيسية
        </a>
      </div>
      
      <div class="intro-dots">
        <span class="intro-dot active"></span>
        <span class="intro-dot"></span>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
